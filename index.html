<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BAC 2026 Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="title">BAC 2026</div>
  <div class="subtitle">Countdown to June 4, 2026</div>

  <div class="countdown">

    <div class="time-box">
      <div id="days" class="number">0</div>
      <div class="label">DAYS</div>
    </div>

    <div class="time-box">
      <div id="hours" class="number">0</div>
      <div class="label">HOURS</div>
    </div>

    <div class="time-box">
      <div id="minutes" class="number">0</div>
      <div class="label">MINUTES</div>
    </div>

    <div class="time-box">
      <div id="seconds" class="number">0</div>
      <div class="label">SECONDS</div>
    </div>

  </div>

  <button id="shareBtn" class="share-btn">SHARE</button>

</div>

<div class="footer">
  Built by <a href="https://instagram.com/z3kri" target="_blank">@z3kri</a>
</div>

<script src="script.js"></script>

</body>
</html>
